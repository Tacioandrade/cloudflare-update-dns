name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  detect-version:
    name: Detect release version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Read commit message
        id: version
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          python3 - <<'PY'
          import os
          import re

          message = os.environ["COMMIT_MESSAGE"].splitlines()[0].strip()
          match = re.match(r"(?i)^vers[aã]o\s+([0-9]+\.[0-9]+\.[0-9]+)\b", message)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              if match:
                  output.write("should_release=true\n")
                  output.write(f"version={match.group(1)}\n")
              else:
                  output.write("should_release=false\n")
                  output.write("version=\n")
          PY

  build-linux:
    name: Build Linux bundle
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libgtk-3-dev \
            libsecret-1-dev \
            liblzma-dev \
            ninja-build \
            pkg-config

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
          cache: true

      - name: Build Linux
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release

      - name: Package Linux bundle
        env:
          VERSION: ${{ needs.detect-version.outputs.version }}
        run: |
          mkdir -p dist
          rm -rf package
          mkdir -p package/cloudflare-update-dns
          cp -a build/linux/x64/release/bundle/. package/cloudflare-update-dns/
          chmod +x package/cloudflare-update-dns/cloudflare_dns
          cat > package/cloudflare-update-dns/install.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          INSTALL_DIR="/opt/cloudflare-update-dns"
          DESKTOP_FILE="/usr/share/applications/cloudflare-dns-manager.desktop"
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          if [ "$(id -u)" -ne 0 ]; then
            echo "Execute este instalador com sudo ou como root."
            exit 1
          fi

          mkdir -p "$INSTALL_DIR"
          cp -a "$SCRIPT_DIR"/. "$INSTALL_DIR"/
          chmod +x "$INSTALL_DIR/cloudflare_dns"
          chmod +x "$INSTALL_DIR/install.sh" "$INSTALL_DIR/uninstall.sh"

          cat > "$DESKTOP_FILE" <<DESKTOP
          [Desktop Entry]
          Type=Application
          Name=Cloudflare DNS Manager
          Exec=$INSTALL_DIR/cloudflare_dns
          Icon=$INSTALL_DIR/data/flutter_assets/assets/icon.png
          Terminal=false
          Categories=Network;Utility;
          DESKTOP

          chmod 644 "$DESKTOP_FILE"

          if command -v update-desktop-database >/dev/null 2>&1; then
            update-desktop-database /usr/share/applications >/dev/null 2>&1 || true
          fi

          echo "Cloudflare DNS Manager instalado em $INSTALL_DIR."
          EOF
          cat > package/cloudflare-update-dns/uninstall.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          INSTALL_DIR="/opt/cloudflare-update-dns"
          DESKTOP_FILE="/usr/share/applications/cloudflare-dns-manager.desktop"

          if [ "$(id -u)" -ne 0 ]; then
            echo "Execute este desinstalador com sudo ou como root."
            exit 1
          fi

          rm -f "$DESKTOP_FILE"
          rm -rf "$INSTALL_DIR"

          if command -v update-desktop-database >/dev/null 2>&1; then
            update-desktop-database /usr/share/applications >/dev/null 2>&1 || true
          fi

          echo "Cloudflare DNS Manager removido."
          EOF
          chmod +x package/cloudflare-update-dns/install.sh package/cloudflare-update-dns/uninstall.sh
          tar -C package -czf "dist/cloudflare-dns-manager-linux-$VERSION.tar.gz" cloudflare-update-dns

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: dist/cloudflare-dns-manager-linux-${{ needs.detect-version.outputs.version }}.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows bundle
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Windows
        shell: pwsh
        run: |
          flutter doctor -v
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

      - name: Package Windows bundle
        shell: pwsh
        env:
          VERSION: ${{ needs.detect-version.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if (Test-Path package) {
            Remove-Item -Recurse -Force package
          }
          if (Test-Path installer) {
            Remove-Item -Recurse -Force installer
          }
          Remove-Item -Path installer.7z, installer-config.txt -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path package\cloudflare-update-dns | Out-Null
          New-Item -ItemType Directory -Force -Path installer | Out-Null
          Copy-Item -Path build\windows\x64\runner\Release\* -Destination package\cloudflare-update-dns -Recurse -Force
          Copy-Item -Path windows\runner\resources\app_icon.ico -Destination package\cloudflare-update-dns\app_icon.ico -Force

          $runtimeDlls = @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")
          $redistRoots = @()
          if ($env:VCToolsRedistDir) {
            $redistRoots += $env:VCToolsRedistDir
          }

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
            if ($vsInstallPath) {
              $redistRoots += Join-Path $vsInstallPath "VC\Redist\MSVC"
            }
          }

          foreach ($dll in $runtimeDlls) {
            $source = $null
            foreach ($root in $redistRoots) {
              if (-not (Test-Path $root)) {
                continue
              }
              $source = Get-ChildItem -Path $root -Recurse -Filter $dll -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match "\\x64\\Microsoft\\.VC.*\\.CRT\\" } |
                Select-Object -First 1
              if ($source) {
                break
              }
            }

            if ($source) {
              Copy-Item -Path $source.FullName -Destination package\cloudflare-update-dns -Force
            } else {
              Write-Warning "Could not find $dll in Visual Studio redistributable directories."
            }
          }

          Compress-Archive `
            -Path package\cloudflare-update-dns `
            -DestinationPath "dist\cloudflare-dns-manager-windows-$env:VERSION`_portable.zip" `
            -Force

          Copy-Item -Path package\cloudflare-update-dns\* -Destination installer -Recurse -Force

          $installScript = @'
          $ErrorActionPreference = "Stop"

          $identity = [Security.Principal.WindowsIdentity]::GetCurrent()
          $principal = New-Object Security.Principal.WindowsPrincipal($identity)
          $isAdmin = $principal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          if (-not $isAdmin) {
            Start-Process `
              -FilePath "powershell.exe" `
              -ArgumentList @("-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "`"$PSCommandPath`"") `
              -Verb RunAs `
              -Wait
            exit
          }

          $installDir = Join-Path $env:ProgramFiles "Cloudflare DNS Manager"
          $shortcutPath = "C:\Users\Default\Cloudflare DNS Manager.lnk"
          $sourceDir = Split-Path -Parent $MyInvocation.MyCommand.Path
          $exePath = Join-Path $installDir "cloudflare_dns.exe"
          $iconPath = Join-Path $installDir "app_icon.ico"

          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Copy-Item -Path (Join-Path $sourceDir "*") -Destination $installDir -Recurse -Force
          Remove-Item -Path (Join-Path $installDir "install.ps1") -Force -ErrorAction SilentlyContinue

          $shell = New-Object -ComObject WScript.Shell
          $shortcut = $shell.CreateShortcut($shortcutPath)
          $shortcut.TargetPath = $exePath
          $shortcut.WorkingDirectory = $installDir
          $shortcut.IconLocation = $iconPath
          $shortcut.Description = "Cloudflare DNS Manager"
          $shortcut.Save()
          '@
          Set-Content -Path installer\install.ps1 -Value $installScript -Encoding UTF8

          $sfxConfig = @'
          ;!@Install@!UTF-8!
          Title="Cloudflare DNS Manager"
          RunProgram="powershell.exe -NoProfile -ExecutionPolicy Bypass -File install.ps1"
          ;!@InstallEnd@!
          '@
          Set-Content -Path installer-config.txt -Value $sfxConfig -Encoding UTF8

          $sevenZipCommand = Get-Command 7z.exe -ErrorAction SilentlyContinue
          if ($sevenZipCommand) {
            $sevenZip = $sevenZipCommand.Source
          } else {
            $sevenZip = "$env:ProgramFiles\7-Zip\7z.exe"
            if (-not (Test-Path $sevenZip)) {
              $sevenZip = "${env:ProgramFiles(x86)}\7-Zip\7z.exe"
            }
          }
          if (-not (Test-Path $sevenZip)) {
            throw "7-Zip executable was not found on the runner."
          }

          $sfxCandidates = @(
            "$env:ProgramFiles\7-Zip\7z.sfx",
            "$env:ProgramFiles\7-Zip\7zCon.sfx",
            "${env:ProgramFiles(x86)}\7-Zip\7z.sfx",
            "${env:ProgramFiles(x86)}\7-Zip\7zCon.sfx"
          )
          $sfxModule = $sfxCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $sfxModule) {
            throw "7-Zip SFX module was not found on the runner."
          }

          Push-Location installer
          & $sevenZip a -t7z ..\installer.7z .\* | Out-Host
          Pop-Location

          $installerExe = "dist\cloudflare-dns-manager-windows-$env:VERSION.exe"
          $output = [System.IO.File]::Create($installerExe)
          foreach ($file in @($sfxModule, "installer-config.txt", "installer.7z")) {
            $inputPath = (Resolve-Path $file).ProviderPath
            $input = [System.IO.File]::OpenRead($inputPath)
            try {
              $input.CopyTo($output)
            } finally {
              $input.Dispose()
            }
          }
          $output.Dispose()

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            dist/cloudflare-dns-manager-windows-${{ needs.detect-version.outputs.version }}_portable.zip
            dist/cloudflare-dns-manager-windows-${{ needs.detect-version.outputs.version }}.exe
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - detect-version
      - build-linux
      - build-windows
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract current version changelog
        env:
          VERSION: ${{ needs.detect-version.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys

          version = os.environ["VERSION"]
          with open("CHANGELOG.md", "r", encoding="utf-8") as changelog:
              content = changelog.read()

          pattern = re.compile(
              rf"^## \[{re.escape(version)}\].*?(?=^## \[|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(content)
          if not match:
              print(f"Could not find changelog entry for version {version}", file=sys.stderr)
              sys.exit(1)

          notes = match.group(0).strip() + "\n"
          with open("RELEASE_NOTES.md", "w", encoding="utf-8") as output:
              output.write(notes)
          PY

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect-version.outputs.version }}
        run: |
          gh release create "$VERSION" dist/* \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --notes-file RELEASE_NOTES.md
